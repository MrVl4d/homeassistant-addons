name: "RTSP Recorder"
version: "1.2.5"
slug: "rtsp_recorder"
description: "Record RTSP streams with speed control, date folders, and webhooks"
url: "https://example.com/rtsp_recorder"
init: false
startup: application
full_access: true
privileged:
  - PERFMON
devices:
  - /dev/dri/renderD128:/dev/dri/renderD128
  - /dev/dri/card0:/dev/dri/card0
  - /dev/media0:/dev/media0
  - /dev/media1:/dev/media1
  - /dev/media2:/dev/media2
  - /dev/video19:/dev/video19
udev: true
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
options:
  streams:
    - url: "rtsp://user:pass@192.168.1.10:554/stream1"
      name: "cam1"
      expected_duration: 60
      max_filesize_mb: 0
      setpts: 10
  default_setpts: 10
  default_expected_duration: 60
  output_dir: "/media/camera"
  event_url: ""
  event_body_template: ""
  use_hwaccel: true
  hw_device: "/dev/dri/renderD128"
  global_quality: 24
  ffmpeg_show_output: false

  # ---- Variant B host-ffmpeg (NEW) ----
  custom_ffmpeg_bin_dir: "/custom-ffmpeg/bin"
  custom_ffmpeg_lib_dir: "/custom-ffmpeg/lib"
  # HW accel selection (NEW): auto|vaapi|drm|none
  hwaccel_mode: "auto"

schema:
  streams:
    - url: str
      name: str?
      expected_duration: int(1,)?
      max_filesize_mb: int(0,)?
      setpts: float(0.001,)?
  default_setpts: float(0.001,)
  default_expected_duration: int(1,)
  output_dir: str
  event_url: url?
  event_body_template: str?
  use_hwaccel: bool
  hw_device: str?
  global_quality: int(0,51)?
  ffmpeg_show_output: bool

  # ---- Variant B host-ffmpeg (NEW) ----
  custom_ffmpeg_bin_dir: str
  custom_ffmpeg_lib_dir: str
  hwaccel_mode: list(auto|vaapi|drm|none)
